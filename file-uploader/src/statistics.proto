syntax = "proto3";

package statistics;

service StatisticsService {
  rpc SaveNew (SaveRequest) returns (SaveResponse) {}
}

message SaveRequest {
  string dateAt = 1;
  int32 milliseconds = 2;
  string type = 3;
  string name = 4;
  string corelationId = 5;
  string userId = 6;
}

message SaveResponse {
  string collectedAt = 1;
}